name: Taller CI Pipeline
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Simular una construcción (Build)
        run: echo "Construyendo el proyecto..."

      - name: 3. Simular guardado de artefacto
        run: |
          mkdir -p build
          cp index.html build/
          echo "Archivos movidos a /build"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Simular prueba de contenido
        run: |
          echo "Ejecutando pruebas..."
          grep -q "Rock" index.html
          echo "Prueba de contenido pasada."

      - name: 3. Simular prueba de copyright
        run: |
          echo "Ejecutando prueba de copyright..."
          grep -q "EventFlow" index.html
          echo "Prueba de copyright pasada."

      - name: 4. Despliegue simulado
        run: echo "¡Pruebas exitosas! Listo para desplegar."
